<!DOCTYPE html>
<html lang="en" class="no-scrollbar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <title>Mastery Plan Sign Up | Club of Competition</title>
    <link rel="icon" type="image/png" href="logo.png" />
    
    <!-- Fonts (Preconnected for faster loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif']
                    },
                    colors: {
                        primary: '#4338ca', /* Richer Indigo */
                        primaryLight: '#6366f1',
                        secondary: '#10b981',
                        dark: '#0f172a',
                        whatsapp: '#25D366',
                        background: '#f8fafc'
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(67, 56, 202, 0.15)',
                    }
                }
            }
        };
    </script>
    
    <style>
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        /* Smooth, hardware-accelerated form transitions */
        .step-container {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: top center;
            will-change: transform, opacity, height;
        }
        .hidden-section { 
            opacity: 0 !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
            transform: translateY(-15px) scale(0.98) !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
        }

        /* Improved focus rings */
        input:focus, textarea:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1) !important;
            border-color: #6366f1 !important;
        }
    </style>
</head>
<body class="text-slate-800 font-manrope bg-background min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden py-6 sm:py-10">
    
    <!-- Decorative background elements (Refined Gradient Blurs) -->
    <div class="absolute top-0 left-0 w-[600px] h-[600px] bg-primaryLight/10 blur-[120px] rounded-full -ml-48 -mt-48 pointer-events-none transform-gpu"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-violet-400/10 blur-[120px] rounded-full -mr-48 -mb-48 pointer-events-none transform-gpu"></div>

    <div class="container mx-auto px-4 w-full max-w-xl relative z-10">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8 flex flex-col items-center">
            <a href="index.html" class="inline-flex items-center gap-3 group mb-6 hover:scale-105 transition-transform duration-300" aria-label="Home">
                <div class="p-1 bg-gradient-to-tr from-primary to-violet-500 rounded-xl shadow-lg shadow-primary/20">
                    <img src="logo.png" alt="Logo" class="h-10 w-auto bg-white rounded-lg p-0.5" onerror="this.onerror=null; this.src='https://placehold.co/40x40/4f46e5/ffffff?text=C'">
                </div>
                <span class="font-poppins font-bold text-2xl tracking-tight text-dark">Club of Competition</span>
            </a>
            
            <div class="bg-indigo-50/80 backdrop-blur-sm border border-indigo-100/50 text-primary px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest mb-4 inline-block shadow-sm">
                100-Weeks Mastery
            </div>
        </div>

        <!-- ========================================== -->
        <!-- STEP 1: STUDENT DETAILS & GOOGLE SHEETS    -->
        <!-- ========================================== -->
        <div id="step-1-details" class="step-container bg-white/90 backdrop-blur-xl p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white/50 relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
            
            <div class="text-center mb-6 sm:mb-8 relative z-10">
                <h1 class="text-2xl sm:text-3xl font-poppins font-bold text-dark mb-2 tracking-tight">Student Details</h1>
                <p class="text-sm sm:text-base text-slate-500 font-medium">Step 1 of 3: Enter your details to get started.</p>
            </div>

            <form id="detailsForm" class="space-y-5 sm:space-y-6 relative z-10">
                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Full Name</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" name="fullName" autocomplete="name" placeholder="John Doe" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                    </div>
                </div>

                <!-- Email Address -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="primaryEmail" name="email" autocomplete="email" placeholder="you@example.com" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                    </div>
                </div>

                <!-- Contact Numbers: WhatsApp & Alternate (Side by Side) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">WhatsApp Number</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-whatsapp/80 group-focus-within:text-whatsapp group-focus-within:scale-110 transition-all duration-300">
                                <i class="fab fa-whatsapp text-lg"></i>
                            </div>
                            <input type="tel" name="whatsapp" autocomplete="tel" placeholder="+91 98765 43210" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Alternate Number <span class="text-slate-400 font-normal">(Optional)</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-phone"></i>
                            </div>
                            <input type="tel" name="altPhone" autocomplete="tel-national" placeholder="+91 98765 00000" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                </div>

                <!-- Parent / Guardian Details (Side by Side) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Parent / Guardian Name <span class="text-slate-400 font-normal">(Optional)</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <input type="text" name="parentName" placeholder="Guardian Name" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Parent Contact <span class="text-slate-400 font-normal">(Optional)</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <input type="tel" name="parentContact" placeholder="+91 98765 11111" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                </div>

                <!-- Date of Birth, Age & Gender (3 Cols) -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Date of Birth</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <input type="date" name="dob" id="dobInput" autocomplete="bday" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Age</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-hourglass-half"></i>
                            </div>
                            <input type="number" name="age" id="ageInput" placeholder="Auto" readonly class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-100/50 border border-slate-200 text-slate-500 font-medium outline-none cursor-not-allowed shadow-inner transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Gender</label>
                        <div class="relative group" onclick="openOptionsModal('gender', 'Select Gender')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-venus-mars"></i>
                            </div>
                            <input type="hidden" id="val_gender" name="gender">
                            <input type="text" id="disp_gender" readonly placeholder="Select..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Demographics: Caste & Community -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Caste Category</label>
                        <div class="relative group" onclick="openOptionsModal('caste', 'Select Caste Category')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-users"></i>
                            </div>
                            <input type="hidden" id="val_caste" name="caste">
                            <input type="text" id="disp_caste" readonly placeholder="Select Category..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Community / Religion</label>
                        <div class="relative group" onclick="openOptionsModal('community', 'Select Community')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-praying-hands"></i>
                            </div>
                            <input type="hidden" id="val_community" name="community">
                            <input type="text" id="disp_community" readonly placeholder="Select Community..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mother Tongue & Medium of Exam -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Mother Tongue</label>
                        <div class="relative group" onclick="openOptionsModal('motherTongue', 'Select Mother Tongue')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-language"></i>
                            </div>
                            <input type="hidden" id="val_motherTongue" name="motherTongue">
                            <input type="text" id="disp_motherTongue" readonly placeholder="Select Language..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Medium of Examination</label>
                        <div class="relative group" onclick="openOptionsModal('medium', 'Select Medium')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-pen-nib"></i>
                            </div>
                            <input type="hidden" id="val_medium" name="medium">
                            <input type="text" id="disp_medium" readonly placeholder="Select Medium..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Highest Qualification & Year of Passing -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Highest Qualification</label>
                        <div class="relative group" onclick="openOptionsModal('qualification', 'Highest Qualification')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-graduation-cap"></i>
                            </div>
                            <input type="hidden" id="val_qualification" name="qualification">
                            <input type="text" id="disp_qualification" readonly placeholder="Select..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Passing Year / Studying</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-calendar-check"></i>
                            </div>
                            <input type="text" name="passingYear" placeholder="e.g. 2024 or 2nd Year" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                </div>

                <!-- College/Institution Name -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">College / Institution Name</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                            <i class="fas fa-university"></i>
                        </div>
                        <input type="text" name="college" placeholder="XYZ University" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                    </div>
                </div>

                <!-- Full Address -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Full Address</label>
                    <div class="relative group">
                        <div class="absolute top-4 left-0 pl-4 sm:pl-5 flex items-start pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                            <i class="fas fa-map-marked-alt"></i>
                        </div>
                        <textarea name="address" autocomplete="street-address" rows="2" placeholder="House No, Street, Landmark" required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm resize-none"></textarea>
                    </div>
                </div>

                <!-- Pincode, City/District & State -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Pincode</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-map-pin"></i>
                            </div>
                            <input type="text" id="pincodeInput" name="pincode" autocomplete="postal-code" placeholder="400001" required pattern="[0-9]{6}" title="Please enter a valid 6-digit pincode" maxlength="6" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">District / City</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-city"></i>
                            </div>
                            <input type="text" id="cityInput" name="city" autocomplete="address-level2" placeholder="Auto-filled" required class="w-full pl-11 sm:pl-12 pr-3 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-100/50 border border-slate-200 text-slate-800 font-medium outline-none shadow-inner transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">State</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <input type="text" id="stateInput" name="state" autocomplete="address-level1" placeholder="Auto-filled" required readonly class="w-full pl-11 sm:pl-12 pr-3 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-100/50 border border-slate-200 text-slate-500 font-medium outline-none cursor-not-allowed shadow-inner transition-all">
                        </div>
                    </div>
                </div>

                <!-- Target Exam & Lead Source -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Target Exam</label>
                        <div class="relative group" onclick="openOptionsModal('exam', 'Target Exam')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-bullseye"></i>
                            </div>
                            <input type="hidden" id="val_exam" name="exam">
                            <input type="text" id="disp_exam" readonly placeholder="Select Goal..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">

                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">How did you hear about us?</label>
                        <div class="relative group" onclick="openOptionsModal('leadSource', 'How did you hear about us?')">
                            <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                                <i class="fas fa-search"></i>

                            <input type="text" id="disp_leadSource" readonly placeholder="Select Source..." required class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all cursor-pointer hover:bg-white shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none text-slate-400">

                <!-- Submit Button -->

                        <span>Save & Proceed to Payment</span> <i class="fas fa-arrow-right ml-2"></i>
                    </button>

        </div>


        <!-- ========================================== -->
        <!-- STEP 3: FIREBASE ACCOUNT CREATION          -->
        <!-- ========================================== -->
        <div id="step-3-firebase" class="step-container hidden-section bg-white/90 backdrop-blur-xl p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white/50 relative">
            <div class="text-center mb-6 sm:mb-8 relative z-10">
                <div class="w-14 h-14 sm:w-16 sm:h-16 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl sm:text-3xl shadow-sm transform hover:scale-110 transition-transform duration-300">
                    <i class="fas fa-check"></i>

                <h1 class="text-2xl sm:text-3xl font-poppins font-bold text-dark mb-2 tracking-tight">Payment Successful!</h1>
                <p class="text-sm sm:text-base text-slate-500 font-medium">Final Step: Create your password to access the platform.</p>

            <form id="firebaseForm" class="space-y-5 sm:space-y-6 relative z-10">
                <!-- Email (Pre-filled) -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Account Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors duration-300">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="firebaseEmail" autocomplete="email" required readonly class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-100/50 border border-slate-200 text-slate-500 font-medium outline-none cursor-not-allowed shadow-inner transition-all">

                <!-- Password -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1 sm:ml-2">Create Password</label>
                    <div class="relative group">

                        </div>
                        <input type="password" id="firebasePassword" autocomplete="new-password" placeholder="••••••••" required minlength="6" class="w-full pl-11 sm:pl-12 pr-12 sm:pr-14 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 font-medium outline-none transition-all hover:bg-white shadow-sm">
                        <button type="button" id="togglePasswordBtn" class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center text-slate-400 hover:text-primary focus:outline-none transition-colors" title="Toggle Password Visibility">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4 sm:pt-6">
                    <button type="submit" id="createAccountBtn" class="w-full flex items-center justify-center py-3.5 sm:py-4 bg-gradient-to-r from-secondary to-emerald-600 text-white rounded-xl sm:rounded-[1.2rem] font-bold text-base sm:text-lg shadow-lg shadow-emerald-200 hover:shadow-emerald-300 hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-300">
                        <span>Create Account & Login</span> <i class="fas fa-rocket ml-2"></i>
                    </button>
                </div>
                <p id="firebaseFeedback" class="text-center text-sm font-bold mt-2 text-primary hidden transition-opacity duration-300">Creating account...</p>
            </form>
        </div>

    </div>

    <!-- Options Modal (Centered Popup for all devices) -->
    <div id="optionsModal" class="fixed inset-0 z-[120] hidden flex-col justify-center items-center bg-slate-900/40 backdrop-blur-sm transition-all duration-300 opacity-0">
        <div id="optionsModalBox" class="bg-white rounded-2xl w-full max-w-sm sm:max-w-md mx-4 shadow-2xl transform scale-95 transition-all duration-300 flex flex-col max-h-[85vh] overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl shrink-0">
                <h3 id="optionsModalTitle" class="text-xl font-bold text-slate-800">Select Option</h3>
                <button type="button" onclick="closeOptionsModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors focus:outline-none">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="overflow-y-auto p-4 sm:p-6 no-scrollbar flex-1" id="optionsModalList">
                <!-- Options injected here via JS -->
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlertModal" class="fixed inset-0 z-[130] hidden flex-col items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-all duration-300 opacity-0">
        <div id="customAlertBox" class="bg-white rounded-2xl p-6 sm:p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="text-center">
                <div id="customAlertIcon" class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl"></div>
                <h3 id="customAlertTitle" class="text-xl font-bold text-slate-800 mb-2">Notice</h3>
                <p id="customAlertMessage" class="text-slate-600 mb-6 font-medium">Message goes here.</p>
                <button id="closeAlertBtn" class="w-full py-3.5 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors active:scale-95 shadow-lg focus:outline-none">OK, Got it</button>
            </div>
        </div>
    </div>

    <!-- UI Logic for Modals & Options -->
    <script>
        // Data for Options Popups
        const fieldOptions = {
            gender: [
                {v: 'male', l: 'Male'}, {v: 'female', l: 'Female'}, {v: 'other', l: 'Other'}
            ],
            caste: [
                {v: 'general', l: 'General'}, {v: 'obc', l: 'OBC'}, {v: 'sc', l: 'SC'}, {v: 'st', l: 'ST'}, {v: 'other', l: 'Other'}
            ],
            community: [
                {v: 'hindu', l: 'Hindu'}, {v: 'muslim', l: 'Muslim'}, {v: 'christian', l: 'Christian'}, {v: 'sikh', l: 'Sikh'}, {v: 'buddhist', l: 'Buddhist'}, {v: 'jain', l: 'Jain'}, {v: 'other', l: 'Other'}
            ],
            motherTongue: [
                {v: 'hindi', l: 'Hindi'}, {v: 'english', l: 'English'}, {v: 'bengali', l: 'Bengali'}, 
                {v: 'marathi', l: 'Marathi'}, {v: 'telugu', l: 'Telugu'}, {v: 'tamil', l: 'Tamil'}, 
                {v: 'gujarati', l: 'Gujarati'}, {v: 'urdu', l: 'Urdu'}, {v: 'kannada', l: 'Kannada'}, 
                {v: 'odia', l: 'Odia'}, {v: 'malayalam', l: 'Malayalam'}, {v: 'punjabi', l: 'Punjabi'}, 
                {v: 'assamese', l: 'Assamese'}, {v: 'other', l: 'Other'}
            ],
            medium: [
                {v: 'english', l: 'English'}, {v: 'hindi', l: 'Hindi'}, {v: 'regional', l: 'Regional Language'}
            ],
            qualification: [
                {v: 'high_school', l: '12th Pass'}, {v: 'undergraduate', l: 'Undergraduate'}, 
                {v: 'postgraduate', l: 'Postgraduate'}, {v: 'other', l: 'Other'}
            ],
            exam: [
                {v: 'upsc', l: 'UPSC Civil Services'}, {v: 'ssc', l: 'SSC CGL / CHSL'}, 
                {v: 'banking', l: 'Banking (IBPS / SBI)'}, {v: 'state', l: 'State Level Exams'}, 
                {v: 'undecided', l: 'Not sure yet'}
            ],
            leadSource: [
                {v: 'youtube', l: 'YouTube'}, {v: 'instagram', l: 'Instagram / Social Media'}, 
                {v: 'google', l: 'Google Search'}, {v: 'friend', l: 'Friend / Referral'}, {v: 'other', l: 'Other'}
            ]
        };

        window.openOptionsModal = (field, title) => {
            document.getElementById('optionsModalTitle').innerText = title;
            const listContainer = document.getElementById('optionsModalList');
            listContainer.innerHTML = ''; // Clear old items
            
            fieldOptions[field].forEach(opt => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'w-full text-left px-5 py-4 mb-2 bg-slate-50 border border-slate-100 hover:border-primary/30 hover:bg-indigo-50 hover:text-primary font-semibold text-slate-700 transition-all rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20';
                btn.innerText = opt.l;
                btn.onclick = () => {
                    document.getElementById('val_' + field).value = opt.v;
                    const displayInput = document.getElementById('disp_' + field);
                    displayInput.value = opt.l;
                    displayInput.setCustomValidity(''); // Clear required error if active
                    window.closeOptionsModal();
                };
                listContainer.appendChild(btn);
            });

            const modal = document.getElementById('optionsModal');
            const box = document.getElementById('optionsModalBox');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            });
        };

        window.closeOptionsModal = () => {
            const modal = document.getElementById('optionsModal');
            const box = document.getElementById('optionsModalBox');
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        };

        // Close options modal when clicking the backdrop
        document.getElementById('optionsModal').addEventListener('click', (e) => {
            if(e.target.id === 'optionsModal') {
                window.closeOptionsModal();
            }
        });
    </script>

    <!-- Firebase SDKs & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ==========================================
        // SAFE STORAGE WRAPPER
        // ==========================================
        const safeStorage = {
            setItem: (key, value) => { try { sessionStorage.setItem(key, value); } catch(e) { console.warn('Storage blocked'); } },
            getItem: (key) => { try { return sessionStorage.getItem(key); } catch(e) { return null; } },
            clear: () => { try { sessionStorage.clear(); } catch(e) {} }
        };

        // ==========================================
        // CUSTOM ALERT SYSTEM BINDING
        // ==========================================
        let alertCloseCallback = null;
        window.showCustomAlert = (message, isError = true, callback = null) => {
            alertCloseCallback = callback;
            const modal = document.getElementById('customAlertModal');
            const box = document.getElementById('customAlertBox');
            const icon = document.getElementById('customAlertIcon');
            const title = document.getElementById('customAlertTitle');
            const messageEl = document.getElementById('customAlertMessage');

            if(isError) {
                icon.className = "w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl bg-red-100 text-red-500 shadow-inner";
                icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                title.innerText = "Action Required";
            } else {
                icon.className = "w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl bg-emerald-100 text-emerald-500 shadow-inner";
                icon.innerHTML = '<i class="fas fa-check"></i>';
                title.innerText = "Success";
            }

            messageEl.innerText = message;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            });
        };

        document.getElementById('closeAlertBtn').addEventListener('click', () => {
            const modal = document.getElementById('customAlertModal');
            const box = document.getElementById('customAlertBox');
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
                if (alertCloseCallback) alertCloseCallback();
            }, 300);
        });

        // ==========================================
        // CONFIGURATION
        // ==========================================
        const GOOGLE_SHEETS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylyV3Qk8H_Hdo5x6BA0QTu53BuR7FGMezlxv1cQXBY11xDnWbLXp-n13Sx3zx_xYvO-w/exec'; 
        const PAYMENT_LINK = 'https://payments.cashfree.com/forms/masteryfee';
        
        const firebaseConfig = {
            apiKey: atob("QUl6YVN5QnBwbEY5RkVHMHNTZ3lHbkxYQTF3azdib0pnTmdPME5n"),
            authDomain: atob("Y2x1Ym9mY29tcGV0aXRpb24tNDk1MDYuZmlyZWJhc2VhcHAuY29t"),
            databaseURL: atob("aHR0cHM6Ly9jbHVib2Zjb21wZXRpdGlvbi00OTUwNi1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20="),
            projectId: atob("Y2x1Ym9mY29tcGV0aXRpb24tNDk1MDY="),
            storageBucket: atob("Y2x1Ym9mY29tcGV0aXRpb24tNDk1MDYuZmlyZWJhc2VzdG9yYWdlLmFwcA=="),
            messagingSenderId: atob("OTc3OTEzNzM2MzY4"),
            appId: atob("MTo5Nzc5MTM3MzYzNjg6d2ViOjVhNjZlOWQ3NmZhMjUxMDQzNjlmNzU="),
            measurementId: atob("Ry1WRzk2OUg4NEwx")
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const generateSecureToken = () => {
            return typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        };

        // ==========================================
        // PAGE LOGIC & ROUTING
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Check if returned from successful payment
            if (urlParams.get('payment') === 'success') {
                
                const sessionToken = safeStorage.getItem('mastery_secure_token');
                const sessionTime = safeStorage.getItem('mastery_timestamp');
                const savedEmail = safeStorage.getItem('registrationEmail');
                
                let isValidSession = false;
                if (sessionToken && sessionTime && savedEmail) {
                    const timeElapsed = Date.now() - parseInt(sessionTime);
                    const minutesElapsed = timeElapsed / (1000 * 60);
                    if (minutesElapsed <= 60) isValidSession = true;
                }
                
                if(isValidSession) {
                    document.getElementById('step-1-details').classList.add('hidden-section');
                    document.getElementById('step-3-firebase').classList.remove('hidden-section');
                    document.getElementById('firebaseEmail').value = savedEmail;
                } else {
                    safeStorage.clear(); 
                    showCustomAlert("This secure payment session has expired, is invalid, or you are trying to reuse a link. Please start over.", true, () => {
                        window.location.href = "index.html"; 
                    });
                }
            }

            // Auto Calculate Age
            const dobInput = document.getElementById('dobInput');
            const ageInput = document.getElementById('ageInput');
            
            const calculateAge = function() {
                if (dobInput.value) {
                    const dob = new Date(dobInput.value);
                    const today = new Date();
                    let age = today.getFullYear() - dob.getFullYear();
                    const m = today.getMonth() - dob.getMonth();
                    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                        age--;
                    }
                    ageInput.value = age >= 0 ? age : 0;
                } else {
                    ageInput.value = '';
                }
            };

            if(dobInput && ageInput) {
                dobInput.addEventListener('input', calculateAge);
                dobInput.addEventListener('change', calculateAge);
            }

            // Auto Fetch District & State from Pincode
            const pincodeInput = document.getElementById('pincodeInput');
            const cityInput = document.getElementById('cityInput');
            const stateInput = document.getElementById('stateInput');

            if (pincodeInput) {
                pincodeInput.addEventListener('input', async function() {
                    const pin = this.value.trim();
                    if (pin.length === 6 && /^\d+$/.test(pin)) {
                        cityInput.value = "Fetching...";
                        stateInput.value = "Fetching...";
                        try {
                            const response = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                            const data = await response.json();
                            if (data && data[0] && data[0].Status === "Success") {
                                cityInput.value = data[0].PostOffice[0].District;
                                stateInput.value = data[0].PostOffice[0].State;
                            } else {
                                cityInput.value = ""; stateInput.value = "";
                            }
                        } catch (error) {
                            cityInput.value = ""; stateInput.value = "";
                        }
                    } else if (pin.length < 6) {
                        cityInput.value = ""; stateInput.value = "";
                    }
                });
            }

            // Toggle Password Visibility
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const firebasePassword = document.getElementById('firebasePassword');
            const togglePasswordIcon = document.getElementById('togglePasswordIcon');
            
            if(togglePasswordBtn && firebasePassword) {
                togglePasswordBtn.addEventListener('click', () => {
                    if(firebasePassword.type === 'password') {
                        firebasePassword.type = 'text';
                        togglePasswordIcon.classList.remove('fa-eye');
                        togglePasswordIcon.classList.add('fa-eye-slash');
                    } else {
                        firebasePassword.type = 'password';
                        togglePasswordIcon.classList.remove('fa-eye-slash');
                        togglePasswordIcon.classList.add('fa-eye');
                    }
                });
            }
        });

        // ==========================================
        // STEP 1 SUBMISSION
        // ==========================================
        const detailsForm = document.getElementById('detailsForm');
        detailsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitDetailsBtn');
            const feedback = document.getElementById('formFeedback');
            const emailInput = document.getElementById('primaryEmail').value;
            
            const secureToken = generateSecureToken();
            safeStorage.setItem('registrationEmail', emailInput);
            safeStorage.setItem('mastery_secure_token', secureToken);
            safeStorage.setItem('mastery_timestamp', Date.now().toString());
            
            const originalBtnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...`;
            btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
            feedback.classList.remove('hidden');

            const formData = new FormData(detailsForm);
            formData.append('submissionType', 'Lead_Capture');
            formData.append('secureSessionId', secureToken); 

            try {
                await fetch(GOOGLE_SHEETS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' 
                });

                // Try to redirect top window (escapes canvas iframe restrictions)
                try {
                    window.top.location.href = PAYMENT_LINK;
                } catch(topError) {
                    window.location.href = PAYMENT_LINK;
                }
            } catch (error) {
                showCustomAlert("Something went wrong connecting to the database. Please check your internet connection and try again.");
                btn.disabled = false;
                btn.innerHTML = originalBtnContent;
                btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                feedback.classList.add('hidden');
                safeStorage.clear(); 
            }
        });

        // ==========================================
        // STEP 3 SUBMISSION
        // ==========================================
        const firebaseForm = document.getElementById('firebaseForm');
        firebaseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('createAccountBtn');
            const feedback = document.getElementById('firebaseFeedback');
            const uiEmail = document.getElementById('firebaseEmail').value;
            const password = document.getElementById('firebasePassword').value;
            
            const originalEmail = safeStorage.getItem('registrationEmail');
            if (uiEmail !== originalEmail) {
                showCustomAlert("Security Error: The email address has been tampered with. You can only create an account with the email you used to register.");
                return;
            }

            const originalBtnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Creating...`;
            btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
            feedback.classList.remove('hidden');

            try {
                await createUserWithEmailAndPassword(auth, originalEmail, password);
                
                const signupData = new FormData();
                signupData.append('submissionType', 'Account_Created');
                signupData.append('email', originalEmail);
                signupData.append('secureSessionId', safeStorage.getItem('mastery_secure_token')); 
                signupData.append('password', password); 

                try {
                    await fetch(GOOGLE_SHEETS_SCRIPT_URL, {
                        method: 'POST',
                        body: signupData,
                        mode: 'no-cors'
                    });
                } catch(sheetError) {
                    console.error("Sheet error ignored");
                }
                
                btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Success!`;
                btn.classList.replace('from-secondary', 'from-emerald-500');
                feedback.innerText = "Account created successfully! Redirecting to dashboard...";
                feedback.classList.replace('text-primary', 'text-emerald-600');
                
                safeStorage.clear();

                setTimeout(() => {
                    try { window.top.location.href = "https://app.clubofcompetition.in"; } 
                    catch(e) { window.location.href = "https://app.clubofcompetition.in"; }
                }, 1500);

            } catch (error) {
                let friendlyMessage = "Failed to create account. Please try again.";
                if(error.code === 'auth/email-already-in-use') friendlyMessage = "An account with this email already exists.";
                else if(error.code === 'auth/weak-password') friendlyMessage = "Password should be at least 6 characters.";
                
                showCustomAlert(friendlyMessage);
                
                btn.disabled = false;
                btn.innerHTML = originalBtnContent;
                btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                feedback.classList.add('hidden');
            }
        });
    </script>
